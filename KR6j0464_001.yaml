body:
  text: 西天譯經三藏朝散大夫試鴻臚少卿傳教大師臣法天奉詔譯如是我聞一時佛在妙高山寶峯樓閣之中以種種金寶而用莊嚴出無數光周匝照曜於諸山巖復有栴檀沈水塗香粖香種種名花及諸寶蓋鈴譯如是嚴飾爾時有天龍夜叉阿修羅乾闥婆迦樓羅緊那羅摩睺羅伽及持明仙部多頻那夜迦毘舍左有形無形末怛里眾等來集會坐可遍五百由旬復有菩薩摩訶薩七千五百人苾芻眾一萬二千五百人俱來會坐而為聽法爾時會中天龍夜叉阿修羅乾闥婆迦樓羅緊那羅摩睺羅伽及持明仙眾部多頻那夜迦毘舍左有形無形末怛里眾等高聲唱言苦哉苦哉時釋迦牟尼如來應正等覺而復問言汝等云何高聲唱言怖畏苦惱彼眾等白言世尊我被大力聖者恐怖降伏而今來此唯願慈悲特垂救護世尊告言今此一切最上廣大曼拏羅中有菩薩摩訶薩得大地補處當紹灌頂法王之位而能覺悟善惡諸業當為安慰汝之心意說是語已剎那之間有菩薩摩訶薩名金剛手如金剛山放金色光普照世界頂戴寶冠面如滿月手執金剛棒金剛橛金剛羂索具大福力能破諸惡領五千金剛族而為眷屬其名曰金剛難拏大將金剛嚩日囉誐囉婆大將金剛嚩日囉計都大將金剛嚩日囉嚩婆娑大將金剛儞攞嚩日囉大將金剛囉怛曩嚩日囉大將金剛玉呬也嚩日囉大將金剛作訖囉嚩日囉大將金剛摩訶嚩日囉難拏主金剛護世明王及金剛魔金剛頻那夜迦金剛曜童子金剛烏娑多羅迦金剛大惡等俱來集會大曼拏羅中放清淨光照曜一切能令眾生心懷歡喜時金剛手菩薩偏袒右肩頂禮佛足右遶三匝合掌住立爾時世尊勅金剛手菩薩言今此會中有天龍夜叉阿修羅及諸部多之類高聲唱言怖畏苦惱汝為安慰令彼快樂於是金剛手菩薩即從座起於天龍阿修羅等部多眾前入三摩地名最上金剛器仗光明燈發大神通令三千大千世界雷雹閃電如大火焰是諸眾生見是事已即除苦惱怕怖復有恒河沙數眾生見是事已發清淨梵行持戒忍辱心一切財寶施金剛手菩薩皆願隨從聽受妙法是時金剛手菩薩即為天龍夜叉之眾說四諦緣生三摩地門十波羅蜜及本金剛族大曼拏羅儀則之法所有梵王天大自在天嚩嚕拏俱尸羅摩嚕多誐嚕拏那羅延天焰摩天帝釋天而得成就者阿修羅乾闥婆而得成就者乃至諸惡部多大羅叉等難調伏者而能調伏懷惡心者而發善心懷邪見者而得正見懷瞋恚者而起慈悲懷愚暗者而能明了先具強力者而失強力先能隱身者而不能隱他真言能自禁斷自真言能求圓滿住曼拏羅中覺悟調伏當如是等爾時佛勅金剛手菩薩汝為宣說無能勝金剛火大陀羅尼令彼受持金剛手菩薩即以此陀羅尼真實威德之力放大光明照彼天人阿修羅等一切賢聖大會之眾復以陀羅尼力故而令日月星宿光明不現大海涌沸妙高山王悉皆震動爾時大光焰藏金寶峯中有金剛手童女變化自身如大熾焰即往虛空至大力菩薩摩訶薩前右繞三匝歸命頂禮住立一面告彼眾曰金剛手菩薩說如來三摩地心汝等當宜各捨金剛器仗等求此大陀羅尼法時世界主大梵王天人阿修羅等俱發聲言如菩薩勅我今奉行於是大自在天捨三股叉那羅延天捨輪焰摩天捨杖俱尾囉天捨棒帝釋天捨金剛杵摩嚕拏天捨羂索天魔捨其障難阿修羅捨其威力摩嚕多捨其迷著母鬼眾離於散亂龍神眾離於恚毒夜叉羅剎緊那羅毘捨左部多沒囉賀摩羅剎娑鳩槃茶等皆去威力於菩薩前一心恭敬金剛手即說陀羅尼曰曩謨引囉怛曩二合怛囉二合夜引野曩摩室戰二合拏嚩日囉二合播引拏曳引摩賀引藥乞叉二合細引曩引鉢哆曳引怛儞也二合他引怛他引誐多三摩引地馱囉尼末引嚩里多二合以瑟也二合引彌曀呬嚩日里二合俱胝羅俱胝播引嚩迦俱羅尸契迦閉羅計尸怛致左致祖引致謨引吒儞迦里迦二合致母致嚩致嚩日里二合引尼禰愈二合路隷母俱母俱酥母酥母婆囉娑囉娑普二合吒娑普二合吒娑普二合吒娑普二合吒烏儞愈二合帝引賓誐隷左致尾左致入嚩二合羅賓誐隷薩里嚩二合禰嚩誐拏鉢囉二合賀囉拏摩引野引悉地㮈引以計酥嚨嚕引嚩日羅二合具引尼引涅里二合荼娑囉鉢囉二合賀囉尼囉怛曩二合怛囉二合野引禰迦羅部帝引嚩日羅二合馱囉尾濕嚩二合引娑儞迦引鉢囉二合賀哆鉢囉二合摩里那二合儞娑嚩二合引賀若此陀羅尼有人聞已一心讀誦憶念受持是人得入一切世間出世間曼拏羅三昧若人隨喜恭敬是人不為禁呪諸毒及一切恐怖之所惱害爾時佛勅金剛手菩薩說大陀羅尼時欲色諸天一切天子於空界中雨種種殊妙香花而用供養復以微妙梵音歌詠讚歎時大曼拏羅會一切聖賢苾芻眾等并大菩薩摩訶薩皆大歡喜信受奉行
